<svg viewBox="0 0 600 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#122C52"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E7A45"/>
      <stop offset="100%" stop-color="#0F5A30"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D982"/>
      <stop offset="50%" stop-color="#D4A017"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F7E2A0"/>
      <stop offset="100%" stop-color="#C9971E"/>
    </linearGradient>
  </defs>

  <!-- ================= SHIELD OUTER (gold border) ================= -->
  <path d="M300 40
           L470 105
           C470 105 470 300 470 340
           C470 460 400 560 300 610
           C200 560 130 460 130 340
           C130 300 130 105 130 105
           Z"
        fill="url(#goldGrad)"/>

  <!-- ================= SHIELD INNER (navy) ================= -->
  <path d="M300 62
           L450 118
           C450 118 450 300 450 338
           C450 447 388 538 300 585
           C212 538 150 447 150 338
           C150 300 150 118 150 118
           Z"
        fill="url(#navyGrad)"/>

  <!-- ================= INNER GREEN FIELD (upper crest area) ================= -->
  <path d="M300 90
           L425 135
           C425 135 425 260 425 285
           C425 340 400 385 360 415
           L300 440
           L240 415
           C200 385 175 340 175 285
           C175 260 175 135 175 135
           Z"
        fill="url(#greenGrad)"/>

  <!-- thin gold inline separating green field from navy -->
  <path d="M300 90 L425 135 C425 135 425 260 425 285 C425 340 400 385 360 415 L300 440 L240 415 C200 385 175 340 175 285 C175 260 175 135 175 135 Z"
        fill="none" stroke="url(#goldThin)" stroke-width="3"/>

  <!-- ================= RISING STAR (behind bat/ball, top of crest) ================= -->
  <g transform="translate(300,175)">
    <!-- motion streak lines trailing the star -->
    <g stroke="#F5D982" stroke-width="4" stroke-linecap="round" opacity="0.85">
      <line x1="-70" y1="34" x2="-38" y2="20"/>
      <line x1="-78" y1="16" x2="-44" y2="8"/>
      <line x1="-72" y1="-4" x2="-40" y2="-6"/>
    </g>
    <path d="M0 -46
             L12.4 -14.6
             L46 -12.4
             L19.8 8.6
             L28.4 41
             L0 21.8
             L-28.4 41
             L-19.8 8.6
             L-46 -12.4
             L-12.4 -14.6 Z"
          fill="url(#goldGrad)" stroke="#7A5A00" stroke-width="1.5"/>
  </g>

  <!-- ================= CRICKET BAT (diagonal, behind ball) ================= -->
  <g transform="translate(300,330) rotate(-32)">
    <!-- blade -->
    <path d="M-16 -155
             C-16 -170 16 -170 16 -155
             L14 40
             C14 55 -14 55 -14 40
             Z"
          fill="#F4EFE3" stroke="#0B1F3A" stroke-width="3"/>
    <!-- blade shoulder shading -->
    <path d="M-16 -155 C-16 -170 16 -170 16 -155 L14 -110 L-14 -110 Z" fill="#E4DBC2"/>
    <!-- handle -->
    <rect x="-9" y="40" width="18" height="95" rx="9" fill="#7B4B24" stroke="#0B1F3A" stroke-width="3"/>
    <!-- grip wraps -->
    <g stroke="#0B1F3A" stroke-width="3">
      <line x1="-9" y1="55" x2="9" y2="55"/>
      <line x1="-9" y1="66" x2="9" y2="66"/>
      <line x1="-9" y1="77" x2="9" y2="77"/>
      <line x1="-9" y1="88" x2="9" y2="88"/>
      <line x1="-9" y1="99" x2="9" y2="99"/>
      <line x1="-9" y1="110" x2="9" y2="110"/>
    </g>
    <!-- gold accent stripe on blade -->
    <rect x="-4" y="-150" width="8" height="180" rx="4" fill="url(#goldGrad)" opacity="0.9"/>
  </g>

  <!-- ================= CRICKET BALL with motion trail ================= -->
  <g transform="translate(372,392)">
    <!-- motion trail -->
    <g stroke="#F5D982" stroke-linecap="round" opacity="0.75">
      <path d="M-6 6 C-30 26 -55 40 -78 46" stroke-width="6" fill="none"/>
      <path d="M-2 16 C-22 34 -42 46 -62 54" stroke-width="4" fill="none" opacity="0.6"/>
    </g>
    <circle cx="0" cy="0" r="30" fill="#A31E22" stroke="#601014" stroke-width="2"/>
    <circle cx="-9" cy="-9" r="10" fill="#C1393D" opacity="0.55"/>
    <!-- seam -->
    <path d="M-24 -14 C-8 -22 8 -22 24 -14" fill="none" stroke="#F4EFE3" stroke-width="2.4"/>
    <path d="M-24 14 C-8 22 8 22 24 14" fill="none" stroke="#F4EFE3" stroke-width="2.4"/>
    <g stroke="#F4EFE3" stroke-width="1.4">
      <line x1="-22" y1="-15" x2="-22" y2="-11"/>
      <line x1="-15" y1="-19" x2="-15" y2="-15"/>
      <line x1="-7" y1="-21.5" x2="-7" y2="-17.5"/>
      <line x1="1" y1="-22" x2="1" y2="-18"/>
      <line x1="9" y1="-21" x2="9" y2="-17"/>
      <line x1="17" y1="-18" x2="17" y2="-14"/>
      <line x1="-22" y1="15" x2="-22" y2="11"/>
      <line x1="-15" y1="19" x2="-15" y2="15"/>
      <line x1="-7" y1="21.5" x2="-7" y2="17.5"/>
      <line x1="1" y1="22" x2="1" y2="18"/>
      <line x1="9" y1="21" x2="9" y2="17"/>
      <line x1="17" y1="18" x2="17" y2="14"/>
    </g>
  </g>

  <!-- ================= YFA MONOGRAM banner across lower shield ================= -->
  <g>
    <path d="M150 460 L450 460 L450 500 C450 505 445 508 440 508 L160 508 C155 508 150 505 150 500 Z"
          fill="url(#navyGrad)" stroke="url(#goldThin)" stroke-width="2.5" opacity="0.0"/>
  </g>
  <text x="300" y="500" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif" font-weight="900"
        font-size="76" letter-spacing="4" fill="url(#goldGrad)"
        stroke="#0B1F3A" stroke-width="2.5" paint-order="stroke">YFA</text>

  <!-- ================= LOWER RIBBON WITH ACADEMY NAME ================= -->
  <g>
    <path d="M150 522
             C150 522 195 545 300 545
             C405 545 450 522 450 522
             L450 555
             C450 555 405 578 300 578
             C195 578 150 555 150 555
             Z"
          fill="url(#greenGrad)" stroke="url(#goldThin)" stroke-width="2"/>
    <text x="300" y="558" text-anchor="middle"
          font-family="Arial, sans-serif" font-weight="700"
          font-size="21" letter-spacing="2.5" fill="#F4EFE3">YOUNG FIGHTERS</text>
    <text x="300" y="536" text-anchor="middle"
          font-family="Arial, sans-serif" font-weight="600"
          font-size="14" letter-spacing="3.5" fill="#F5D982" opacity="0.95">EST. CRICKET ACADEMY</text>
  </g>

  <!-- ================= BOTTOM SHIELD POINT ACCENT ================= -->
  <g stroke="url(#goldThin)" stroke-width="3" fill="none">
    <path d="M175 400 C175 460 220 530 300 578" opacity="0.6"/>
    <path d="M425 400 C425 460 380 530 300 578" opacity="0.6"/>
  </g>
</svg>
